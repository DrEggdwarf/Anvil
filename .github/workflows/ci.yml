name: Anvil CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Opt into Node.js 24 for all actions (Node 20 deprecated June 2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install dependencies
        # Use pyproject.toml versions — same as local venv (ADR-019)
        run: pip install -e "backend/[dev]"
      - name: Ruff lint
        run: ruff check backend/ tests/ anvil_mcp/
      - name: Ruff format check
        run: ruff format --check backend/ tests/ anvil_mcp/
      - name: Bandit security scan
        run: bandit -r backend/ -c backend/pyproject.toml

  audit:
    name: Dependency audits
    runs-on: ubuntu-latest
    # Audits report for visibility but do not gate the build — a fresh upstream
    # CVE shouldn't block a hotfix. Promote each step to required when the team
    # has SLAs for pinning bumps.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: pip-audit (Python deps via pyproject.toml)
        run: |
          pip install --upgrade pip
          pip install pip-audit
          pip install -e "backend/[dev,re,pwn,protocols]"
          pip-audit --ignore-vuln CVE-2026-3219
          # firmware excluded: binwalk has no PyPI release for Python 3.13+
          # CVE-2026-3219: affects pip itself (runner-managed), fixed by upgrade above
      - name: npm audit (high+ only)
        run: npm audit --audit-level=high
      - name: Cache cargo-audit binary
        id: cache-cargo-audit
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-v0.22-${{ runner.os }}
      - name: Install cargo-audit
        if: steps.cache-cargo-audit.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --locked
      - name: cargo-audit (Rust deps for src-tauri)
        working-directory: src-tauri
        run: |
          # audit.toml ignores known Tauri transitive dep advisories (all unfixable).
          # See src-tauri/.cargo/audit.toml for the documented list.
          cargo audit

  test:
    name: Tests (Python + Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install Python deps
        # ADR-019: pyproject.toml is the single source of truth.
        run: pip install -e "backend/[dev]"
      - name: Install Node deps
        run: npm ci
      - name: Run Python tests
        # `python -m` puts the repo root on sys.path so `from backend.app...` resolves.
        run: python -m pytest tests/ -v --tb=short
      - name: Run vitest unit/component tests
        run: npm run test:run

  smoke:
    name: Smoke (live backend)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend
        run: pip install -e "backend/[dev,pwn]"
      - name: Boot backend
        run: |
          uvicorn backend.app.main:app --host 127.0.0.1 --port 8000 --log-level error &
          for i in {1..30}; do
            curl -fs http://127.0.0.1:8000/api/health && break
            sleep 1
          done
      - name: Run smoke checks
        run: bash tests/e2e/smoke/backend.sh

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: test
    # Playwright pulls ~150 MB of browsers; allow the job to fail without
    # gating the whole CI until tests are stable. Promote to required when
    # the suite has been green for 2 weeks.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install backend (with pwn for Pwn specs)
        run: pip install -e "backend/[dev,pwn]"
      - name: Install runtime tools (nasm, gdb, gcc)
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm gdb gcc
      - name: Install Node deps
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build sample binaries
        run: make -C samples/pwn || true
      - name: Run Playwright tests
        env:
          CI: "1"
          E2E_HAS_GAS: "1"
          E2E_HAS_GCC: "1"
        run: npx playwright test
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
