name: Anvil CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install ruff bandit
      - name: Ruff lint
        run: ruff check backend/ tests/
      - name: Ruff format check
        run: ruff format --check backend/ tests/
      - name: Bandit security scan
        run: bandit -r backend/ -c backend/pyproject.toml

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        # ADR-019: pyproject.toml is the single source of truth.
        # `slowapi` is already pinned via the core deps in [project.dependencies].
        run: pip install -e "backend/[dev]"
      - name: Run tests
        run: cd backend && pytest ../tests/ -v --tb=short
